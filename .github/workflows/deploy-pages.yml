name: Deploy Eltville roadmap to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /Roadmap-Eltville
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: pnpm einrichten
        run: |
          corepack enable
          corepack prepare pnpm@11.7.0 --activate

      - name: Abhängigkeiten installieren
        run: pnpm install --frozen-lockfile

      - name: GitHub Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Webseite bauen
        run: pnpm build

      - name: Webseite als Pages-Artefakt bereitstellen
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Webseite veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
